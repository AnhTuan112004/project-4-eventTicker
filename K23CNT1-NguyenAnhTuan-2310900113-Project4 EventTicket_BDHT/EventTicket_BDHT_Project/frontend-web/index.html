<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Ticket Booking Platform - BDHT</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>
    
    <main>
        <div style="text-align: center; margin-bottom: 3rem;">
            <h1 style="font-size: 2.5rem; margin-bottom: 1rem;">🎉 Chào mừng đến với EventTicket</h1>
            <p style="font-size: 1.1rem; color: #666;">Khám phá các sự kiện hấp dẫn và đặt vé ngay hôm nay!</p>
        </div>

        <div id="events-container" class="grid">
            <!-- Events will be loaded here -->
        </div>
    </main>

    <footer style="background: #f5f5f5; padding: 2rem; text-align: center; margin-top: 3rem; color: #666;">
        <p>&copy; 2026 EventTicket Platform. All rights reserved.</p>
    </footer>

    <!-- Load header -->
    <script>
        fetch('components/header.html')
            .then(r => r.text())
            .then(html => {
                document.getElementById('header-placeholder').innerHTML = html;
            });
    </script>
    
    <script src="assets/js/core/api-client.js"></script>
    <script src="assets/js/home.js"></script>
</body>
</html>
