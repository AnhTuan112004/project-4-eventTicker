<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - EventTicket</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <main style="display: flex; justify-content: center; align-items: center; min-height: 100vh; margin-top: 0;">
        <div class="card" style="width: 100%; max-width: 400px;">
            <h2 style="text-align: center; margin-bottom: 2rem;">🎟️ Đăng Nhập EventTicket</h2>
            
            <div id="alert-container"></div>
            
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        required 
                        placeholder="example@email.com"
                    >
                </div>

                <div class="form-group">
                    <label for="password">Mật khẩu:</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        required 
                        placeholder="Nhập mật khẩu"
                    >
                </div>

                <button type="submit" class="btn" style="width: 100%; margin-bottom: 1rem;">
                    Đăng Nhập
                </button>
            </form>

            <p style="text-align: center;">
                Chưa có tài khoản? <a href="register.html" style="color: #667eea;">Đăng ký ngay</a>
            </p>
        </div>
    </main>

    <script src="../../assets/js/auth.js"></script>
</body>
</html>
