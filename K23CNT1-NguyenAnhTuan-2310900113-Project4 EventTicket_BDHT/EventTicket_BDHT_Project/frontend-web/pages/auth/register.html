<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - EventTicket</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <main style="display: flex; justify-content: center; align-items: center; min-height: 100vh; margin-top: 0;">
        <div class="card" style="width: 100%; max-width: 400px;">
            <h2 style="text-align: center; margin-bottom: 2rem;">🎟️ Đăng Ký EventTicket</h2>
            
            <div id="alert-container"></div>
            
            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="fullname">Họ và Tên:</label>
                    <input 
                        type="text" 
                        id="fullname" 
                        name="fullname" 
                        required 
                        placeholder="Nhập họ và tên"
                    >
                </div>

                <div class="form-group">
                    <label for="email">Email:</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        required 
                        placeholder="example@email.com"
                    >
                </div>

                <div class="form-group">
                    <label for="phone">Số điện thoại:</label>
                    <input 
                        type="tel" 
                        id="phone" 
                        name="phone" 
                        required 
                        placeholder="0xxxxxxxxx"
                    >
                </div>

                <div class="form-group">
                    <label for="password">Mật khẩu:</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        required 
                        placeholder="Nhập mật khẩu (tối thiểu 6 ký tự)"
                    >
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Xác nhận mật khẩu:</label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        name="confirmPassword" 
                        required 
                        placeholder="Xác nhận mật khẩu"
                    >
                </div>

                <button type="submit" class="btn" style="width: 100%; margin-bottom: 1rem;">
                    Đăng Ký
                </button>
            </form>

            <p style="text-align: center;">
                Đã có tài khoản? <a href="login.html" style="color: #667eea;">Đăng nhập</a>
            </p>
        </div>
    </main>

    <script src="../../assets/js/auth.js"></script>
</body>
</html>
