<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh Toán - EventTicket</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>
    
    <main class="container">
        <h2 style="margin-bottom: 2rem;">🛒 Thanh Toán Vé</h2>
        
        <div id="alert-container"></div>
        
        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 2rem;">
            <!-- Form thanh toán -->
            <div class="card">
                <h3>Thông Tin Thanh Toán</h3>
                
                <form id="paymentForm" onsubmit="handlePayment(event)">
                    <div class="form-group">
                        <label for="fullname">Họ và Tên:</label>
                        <input type="text" id="fullname" name="fullname" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Số Điện Thoại:</label>
                        <input type="tel" id="phone" name="phone" required>
                    </div>

                    <div class="form-group">
                        <label for="paymentMethod">Phương Thức Thanh Toán:</label>
                        <select id="paymentMethod" name="paymentMethod" required>
                            <option value="">-- Chọn phương thức --</option>
                            <option value="CREDIT_CARD">💳 Thẻ Tín Dụng</option>
                            <option value="BANK_TRANSFER">🏦 Chuyển Khoản</option>
                            <option value="MOMO">📱 Ví MoMo</option>
                        </select>
                    </div>

                    <!-- Card payment fields -->
                    <div id="card-fields" style="display: none;">
                        <div class="form-group">
                            <label for="cardNumber">Số Thẻ:</label>
                            <input type="text" id="cardNumber" name="cardNumber" placeholder="1234 5678 9012 3456">
                        </div>

                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                            <div class="form-group">
                                <label for="expiryDate">Hạn:</label>
                                <input type="text" id="expiryDate" name="expiryDate" placeholder="MM/YY">
                            </div>
                            <div class="form-group">
                                <label for="cvv">CVV:</label>
                                <input type="text" id="cvv" name="cvv" placeholder="123" maxlength="3">
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn" style="width: 100%; padding: 1rem; font-size: 1.1rem;">
                        Thanh Toán
                    </button>
                </form>
            </div>

            <!-- Tóm tắt đơn hàng -->
            <div class="card">
                <h3>Tóm Tắt Đơn Hàng</h3>
                
                <div id="order-summary">
                    <p class="loading">Đang tải...</p>
                </div>
            </div>
        </div>

        <div class="card" style="margin-top: 2rem;">
            <button class="btn" onclick="goBack()" style="width: 100%;">← Quay Lại</button>
        </div>
    </main>

    <!-- Load header -->
    <script>
        fetch('../../components/header.html')
            .then(r => r.text())
            .then(html => {
                document.getElementById('header-placeholder').innerHTML = html;
            });
    </script>
    
    <script src="../../assets/js/checkout.js"></script>
</body>
</html>
