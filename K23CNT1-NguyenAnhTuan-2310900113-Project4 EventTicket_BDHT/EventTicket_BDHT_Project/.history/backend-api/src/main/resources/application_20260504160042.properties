# Spring Boot Configuration for EventTicket Backend

# Server
server.port=8080

# Database Configuration (SQL Server)
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=Event_Ticket_BDHT;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=your_password_here
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=eventticketbdhtsecretkeymin32characterslongforsecurity
app.jwt.expiration=86400000

# CORS (for Frontend)
spring.web.cors.allowed-origins=http://localhost:5500,http://localhost:8000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

