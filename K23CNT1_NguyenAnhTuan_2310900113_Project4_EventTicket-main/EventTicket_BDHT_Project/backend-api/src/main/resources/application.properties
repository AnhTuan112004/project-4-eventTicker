# ==========================================
# 3. JPA / HIBERNATE CONFIGURATION
# ==========================================
# Tự động cập nhật bảng nếu Entity có thay đổi
# Dùng 'none' để tránh lỗi FK duplicate trên SQL Server (schema đã ổn định)
spring.jpa.hibernate.ddl-auto=none

# Chỉ định rõ loại Database để Hibernate tối ưu câu lệnh
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

# Bật hiển thị câu lệnh SQL ra console để dễ debug (Rất cần thiết khi làm Backend)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# 4. JWT CONFIGURATION
# ==========================================
app.jwtSecret=eventticketbdhtsecretkeymin32characterslongforsecurity
app.jwtExpirationMs=86400000

# ==========================================
# 5. CORS CONFIGURATION (Tùy chọn)
# ==========================================
spring.web.cors.allowed-origins=http://localhost:5500,http://127.0.0.1:5500,http://localhost:8000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.web.cors.allowed-headers=*

# ==========================================
# 6. EMAIL CONFIGURATION
# ==========================================
# Gmail SMTP Server
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Frontend URL (Đổi lại thành 5500 cho khớp với cổng Live Server của bạn)
app.frontend.url=http://127.0.0.1:5500

