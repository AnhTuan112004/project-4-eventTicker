<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDHT - Đi chơi đâu, lên BDHT</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="header-container"></div>

    <main>
        <!-- Banner Section -->
        <section class="banner">
            <img src="https://images.unsplash.com/photo-1459749411175-04bf5292ceea?q=80&w=1200&auto=format&fit=crop" alt="Event Banner">
        </section>

        <!-- Events Section -->
        <section class="container">
            <div class="home-search-panel">
                <div>
                    <h2 class="section-title">Sự kiện nổi bật</h2>
                    <p class="section-subtitle">Khám phá sự kiện theo danh mục hoặc tìm kiếm nhanh.</p>
                </div>
                <div class="search-row">
                    <input type="text" id="event-search-keyword" placeholder="Tìm kiếm sự kiện theo tên hoặc nghệ sĩ" />
                    <button id="btn-search-events">Tìm kiếm</button>
                </div>
            </div>

            <div id="category-filters" class="category-filters"></div>
            <div id="event-list" class="event-grid">
                <!-- Events will be loaded here via JS -->
            </div>
        </section>

        <section class="container">
            <h2 class="section-title">Sự kiện mới nhất</h2>
            <div id="latest-event-list" class="event-grid"></div>
        </section>
    </main>

    <div id="footer-container"></div>
    
    <!-- Chat Widget Placeholder -->
    <div class="chat-widget" onclick="toggleChatPopup()" style="cursor: pointer;">
        <i class="far fa-comment-dots"></i>
    </div>

    <!-- Chat Popup Modal -->
    <div id="chat-popup" class="chat-panel-popup" style="display: none;">
        <div class="chat-header">
            <div>
                <h3>Chat hỗ trợ AI</h3>
            </div>
            <div>
                <button id="btn-new-session" class="btn-action" style="background:#17a2b8; padding: 5px 10px; font-size: 12px; border: none; border-radius: 4px; color: #fff; cursor: pointer;">Mới</button>
                <button onclick="toggleChatPopup()" style="background: none; border: none; font-size: 22px; cursor: pointer; color: #333; line-height: 1; margin-left: 5px;">&times;</button>
            </div>
        </div>
        <input type="hidden" id="session-code" />
        <div class="chat-box" id="chat-box"></div>
        <div class="chat-input-row">
            <input type="text" id="chat-message" placeholder="Nhập tin nhắn..." />
            <button id="btn-send">Gửi</button>
        </div>
    </div>

    <style>
        .chat-panel-popup {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 350px;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 15px;
            background: #fff;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }
        .chat-panel-popup .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        .chat-panel-popup .chat-header h3 { margin: 0; font-size: 16px; color: #333; }
        .chat-panel-popup .chat-box {
            height: 280px;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 12px;
            overflow-y: auto;
            background: #f9f9f9;
            margin-bottom: 12px;
            font-size: 14px;
        }
        .chat-panel-popup .chat-message { margin-bottom: 12px; }
        .chat-panel-popup .chat-message.user { text-align: right; }
        .chat-panel-popup .chat-message .message-label {
            display: inline-block; background: #007bff; color: white; padding: 8px 12px; border-radius: 15px; max-width: 85%; word-wrap: break-word; text-align: left;
        }
        .chat-panel-popup .chat-message.ai .message-label { background: #6c757d; }
        .chat-panel-popup .chat-input-row { display: flex; gap: 8px; }
        .chat-panel-popup .chat-input-row input { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #ccc; outline: none; }
        .chat-panel-popup .chat-input-row button { padding: 10px 15px; border: none; border-radius: 6px; background: #28a745; color: #fff; cursor: pointer; font-weight: bold; }
        .home-search-panel { display:flex; flex-wrap:wrap; justify-content:space-between; gap:16px; align-items:flex-end; margin: 36px 0 16px; }
        .home-search-panel .search-row { display:flex; gap:12px; flex:1; min-width:260px; }
        .home-search-panel input { flex:1; padding: 12px 14px; border-radius: 8px; border:1px solid #ccc; }
        .home-search-panel button { padding: 12px 22px; border:none; border-radius:8px; background:#007bff; color:white; cursor:pointer; }
        .category-filters { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:20px; }
        .category-chip { padding: 8px 14px; border-radius: 999px; background:#f1f1f1; border:1px solid #ddd; cursor:pointer; transition: all .2s ease; }
        .category-chip.active, .category-chip:hover { background:#007bff; color:#fff; border-color:#007bff; }
    </style>

    <script>
        function toggleChatPopup() {
            const popup = document.getElementById('chat-popup');
            if (popup.style.display === 'none' || popup.style.display === '') {
                popup.style.display = 'flex';
            } else {
                popup.style.display = 'none';
            }
        }
    </script>

    <!-- Scripts -->
    <script src="/assets/js/core/api-client.js"></script>
    <script src="/assets/js/home.js"></script>
    <script src="/assets/js/ai-chat.js"></script>
</body>
</html>
