<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Chủ - Đặt Vé Sự Kiện</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        /* CSS cơ bản để dàn trang dạng Grid (Lưới) cho các sự kiện */
        .event-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .event-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        .btn-buy {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 15px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }
        .btn-buy:hover { background-color: #0056b3; }
        .hero { text-align: center; padding: 40px 20px; background-color: #f8f9fa; }
    </style>
</head>
<body>

    <div id="header-container"></div>

    <main>
        <section class="hero">
            <h1>Chào mừng đến với Nền tảng Đặt Vé Sự Kiện</h1>
            <p>Khám phá các sự kiện hấp dẫn và đặt vé ngay hôm nay!</p>
        </section>

        <section>
            <h2 style="text-align: center; margin-top: 30px;">Sự kiện sắp diễn ra</h2>
            
            <div id="event-list" class="event-grid">
                </div>
        </section>
    </main>

    <script src="/assets/js/core/api-client.js"></script>
    <script src="/assets/js/home.js"></script>
</body>
</html>
