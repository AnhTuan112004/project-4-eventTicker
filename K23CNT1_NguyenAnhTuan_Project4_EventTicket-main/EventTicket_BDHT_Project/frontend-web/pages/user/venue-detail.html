<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi Tiết Địa Điểm - BDHT Premium</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: { purple: '#5f1082', orange: '#f26f21' } },
                    fontFamily: { sans: ['Poppins', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
        .venue-detail { max-width: 900px; margin: 40px auto; padding: 20px; }
        .venue-card { border:1px solid #ddd; border-radius:12px; padding:24px; background:#fff; }
        .venue-card h1 { margin-top:0; }
        .venue-field { margin-bottom:16px; }
        .venue-field strong { display:inline-block; width:150px; }
        .back-link { display:inline-block; margin-top:18px; text-decoration:none; color:#007bff; }
    </style>
</head>
<body>
    <div id="header-container"></div>
    <main class="venue-detail">
        <div class="venue-card">
            <div id="detail-content">Đang tải thông tin địa điểm...</div>
            <a href="venues.html" class="back-link">⟵ Quay lại danh sách địa điểm</a>
        </div>
    </main>

    <script src="../../assets/js/core/api-client.js"></script>
    <script src="../../assets/js/venue-detail.js"></script>
</body>
</html>
