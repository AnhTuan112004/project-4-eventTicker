<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Giỏ Hàng - EventTicket</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        .cart-page { max-width: 1100px; margin: 40px auto; padding: 20px; }
        .cart-header { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 16px; align-items: center; }
        .cart-header h1 { margin: 0; }
        .cart-summary { margin-top: 20px; background: #f8f9fa; border-radius: 10px; padding: 18px; border: 1px solid #ddd; }
        .cart-table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        .cart-table th, .cart-table td { border: 1px solid #ddd; padding: 12px; }
        .cart-table th { background: #f1f1f1; }
        .empty-state { color: #666; font-style: italic; padding: 24px; text-align: center; }
        .btn-primary { padding: 12px 22px; border:none; border-radius: 6px; background:#28a745; color:white; cursor:pointer; font-weight:bold; }
        .btn-primary:hover { background:#218838; }
        .btn-secondary { padding: 10px 18px; border:none; border-radius:6px; background:#007bff; color:white; cursor:pointer; }
        .btn-secondary:hover { background:#0069d9; }
    </style>
</head>
<body>
    <div id="header-container"></div>
    <main class="cart-page">
        <div class="cart-header">
            <div>
                <h1>Giỏ hàng của bạn</h1>
                <p>Quản lý đơn hàng hiện tại và chuyển sang thanh toán.</p>
            </div>
            <button id="btn-refresh" class="btn-secondary">Tải lại giỏ hàng</button>
        </div>

        <div id="cart-message" class="empty-state">Đang tải giỏ hàng...</div>
        <div id="cart-details" style="display:none;">
            <div class="cart-summary" id="cart-summary"></div>
            <table class="cart-table" id="cart-table">
                <thead>
                    <tr>
                        <th>Vé</th>
                        <th>Loại vé</th>
                        <th>Số lượng</th>
                        <th>Đơn giá</th>
                        <th>Thành tiền</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody id="cart-items"></tbody>
            </table>
            <div style="margin-top: 20px; display:flex; flex-wrap:wrap; gap:10px; align-items:center; justify-content: space-between;">
                <div id="cart-total" style="font-size: 20px; font-weight: bold;"></div>
                <div>
                    <button id="btn-confirm-order" class="btn-primary">Xác nhận đơn hàng</button>
                    <button id="btn-go-payment" class="btn-secondary">Tiến hành thanh toán</button>
                </div>
            </div>
        </div>
    </main>

    <script src="/assets/js/core/api-client.js"></script>
    <script src="/assets/js/cart.js"></script>
</body>
</html>
