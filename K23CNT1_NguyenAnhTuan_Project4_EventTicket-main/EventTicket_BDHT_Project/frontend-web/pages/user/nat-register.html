<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - BDHT Premium Ticketing</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            purple: '#5f1082',
                            purpleHover: '#4d0b6b',
                            orange: '#f26f21',
                            orangeHover: '#d95a12',
                            darkBg: '#333333'
                        }
                    },
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased flex flex-col min-h-screen">


    <main class="flex-1 flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 bg-gradient-to-br from-indigo-50 to-purple-50">
        <div class="max-w-md w-full bg-white rounded-3xl p-8 shadow-[0_20px_50px_rgba(0,0,0,0.1)] border border-gray-100">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">Tạo Tài Khoản</h2>
                <p class="text-sm font-medium text-gray-500 mt-2">Trở thành thành viên BDHT ngay hôm nay</p>
            </div>
            
            <form id="registerForm" class="flex flex-col gap-4">
                <div id="register-msg" class="hidden font-bold text-sm p-3 rounded-xl"></div>

                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-bold text-gray-700 uppercase tracking-wide">Họ và Tên</label>
                    <input type="text" id="fullName" required placeholder="Nhập họ và tên của bạn" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm font-medium focus:border-brand-purple focus:ring-4 focus:ring-brand-purple/10 outline-none transition-all">
                </div>
                
                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-bold text-gray-700 uppercase tracking-wide">Email</label>
                    <input type="email" id="email" required placeholder="Nhập email" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm font-medium focus:border-brand-purple focus:ring-4 focus:ring-brand-purple/10 outline-none transition-all">
                </div>
                
                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-bold text-gray-700 uppercase tracking-wide">Số điện thoại <span class="text-[10px] text-gray-400 normal-case">(Tùy chọn)</span></label>
                    <input type="text" id="phoneNumber" placeholder="Nhập số điện thoại" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm font-medium focus:border-brand-purple focus:ring-4 focus:ring-brand-purple/10 outline-none transition-all">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="flex flex-col gap-1.5">
                        <label class="text-xs font-bold text-gray-700 uppercase tracking-wide">Mật khẩu</label>
                        <input type="password" id="password" required placeholder="Nhập mật khẩu" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm font-medium focus:border-brand-purple focus:ring-4 focus:ring-brand-purple/10 outline-none transition-all">
                    </div>
                    
                    <div class="flex flex-col gap-1.5">
                        <label class="text-xs font-bold text-gray-700 uppercase tracking-wide">Xác nhận</label>
                        <input type="password" id="confirmPassword" required placeholder="Nhập lại" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm font-medium focus:border-brand-purple focus:ring-4 focus:ring-brand-purple/10 outline-none transition-all">
                    </div>
                </div>

                <button type="submit" class="w-full bg-brand-orange hover:bg-brand-orangeHover text-white font-extrabold px-6 py-3.5 rounded-xl text-sm uppercase tracking-wider transition-all duration-300 shadow-md hover:shadow-xl hover:-translate-y-0.5 mt-4">
                    Đăng Ký
                </button>
            </form>

            <p class="text-center mt-6 text-sm font-medium text-gray-600">
                Đã có tài khoản? <a href="nat-login.html" class="font-extrabold text-brand-purple hover:text-brand-orange transition-colors">Đăng nhập ngay</a>
            </p>
        </div>
    </main>

    <script src="../../assets/js/core/nat-api-client.js"></script>
    <script src="../../assets/js/nat-auth.js"></script>
</body>
</html>
