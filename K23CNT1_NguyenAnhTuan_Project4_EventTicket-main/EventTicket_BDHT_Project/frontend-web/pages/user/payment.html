<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thanh Toán - EventTicket</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
        .payment-page { max-width: 900px; margin: 40px auto; padding: 20px; }
        .payment-panel { background:#f8f9fa; border:1px solid #ddd; border-radius:12px; padding:24px; }
        .payment-panel h1 { margin-top: 0; }
        .field-group { margin-bottom: 18px; }
        .field-group label { display:block; margin-bottom:8px; font-weight:600; }
        .field-group input, .field-group select { width:100%; padding:10px; border:1px solid #ccc; border-radius:6px; }
        .btn-pay { padding: 14px 22px; border:none; border-radius:8px; background:#007bff; color:white; font-weight:bold; cursor:pointer; }
        .btn-pay:hover { background:#0069d9; }
        .status-message { margin-top: 18px; font-weight:bold; }
    </style>
</head>
<body>
    <div id="header-container"></div>
    <main class="payment-page">
        <section class="payment-panel">
            <h1>Thanh toán đơn hàng</h1>
            <div id="payment-info">Đang tải thông tin đơn hàng...</div>

            <form id="payment-form" style="margin-top: 24px; display:none;">
                <div class="field-group">
                    <label for="payment-method">Chọn phương thức thanh toán</label>
                    <select id="payment-method">
                        <option value="CASH">Tiền mặt</option>
                        <option value="MOMO">MOMO</option>
                        <option value="VNPAY">VNPAY</option>
                        <option value="ZALOPAY">ZALOPAY</option>
                    </select>
                </div>
                <button type="submit" class="btn-pay">Thanh toán ngay</button>
            </form>
            <div id="payment-result" class="status-message"></div>
        </section>
    </main>

    <script src="../../assets/js/core/api-client.js"></script>
    <script src="../../assets/js/payment.js"></script>
</body>
</html>
