<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng Ký - EventTicket</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        /* Đồng bộ giao diện với trang Login */
        .auth-container { max-width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold;}
        .form-group input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px;}
        .btn-main { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px;}
        .btn-main:hover { background-color: #218838; }
    </style>
</head>
<body>
    <div id="header-container"></div>

    <main class="auth-container">
        <h2 style="text-align: center; margin-bottom: 20px;">Đăng Ký Tài Khoản</h2>
        
        <form id="registerForm">
            <div id="register-msg" style="margin-bottom: 15px; font-weight: bold; display: none;"></div>

            <div class="form-group">
                <label>Họ và Tên:</label>
                <input type="text" id="fullName" required placeholder="Nhập họ và tên của bạn">
            </div>
            
            <div class="form-group">
                <label>Email:</label>
                <input type="email" id="email" required placeholder="Nhập email">
            </div>
            
            <div class="form-group">
                <label>Số điện thoại:</label>
                <input type="text" id="phoneNumber" placeholder="Nhập số điện thoại (tùy chọn)">
            </div>
            
            <div class="form-group">
                <label>Mật khẩu:</label>
                <input type="password" id="password" required placeholder="Nhập mật khẩu">
            </div>
            
            <div class="form-group">
                <label>Xác nhận Mật khẩu:</label>
                <input type="password" id="confirmPassword" required placeholder="Nhập lại mật khẩu">
            </div>
            
            <button type="submit" class="btn-main">Đăng Ký</button>
        </form>

        <p style="text-align: center; margin-top: 20px;">
            Đã có tài khoản? <a href="/pages/user/login.html" style="color: #007bff; text-decoration: none; font-weight: bold;">Đăng nhập ngay</a>
        </p>
    </main>

    <script src="/assets/js/core/api-client.js"></script>
    <script src="/assets/js/auth.js"></script>
</body>
</html>
