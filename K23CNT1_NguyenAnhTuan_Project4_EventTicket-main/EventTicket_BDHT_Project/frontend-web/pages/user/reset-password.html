<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - BDHT</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #6b21a8 0%, #f97316 100%);
        }

        .reset-container {
            width: min(450px, 100%);
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }

        .reset-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .reset-header h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #333;
        }

        .reset-header p {
            color: #666;
            font-size: 14px;
        }

        .reset-form {
            display: none;
        }

        .reset-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #6b21a8;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: #6b21a8;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-submit:hover {
            background: #581c87;
        }

        .btn-submit:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .form-links {
            text-align: center;
            margin-top: 20px;
        }

        .form-links a {
            color: #6b21a8;
            text-decoration: none;
            font-size: 14px;
        }

        .form-links a:hover {
            text-decoration: underline;
        }

        .error-message {
            color: #e53e3e;
            font-size: 14px;
            margin-top: 8px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            color: #22863a;
            font-size: 14px;
            margin-top: 8px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .otp-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .otp-input {
            width: 50px;
            height: 50px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
        }

        .otp-input:focus {
            border-color: #6b21a8;
        }

        .timer {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .timer.warning {
            color: #f97316;
        }

        .timer.expired {
            color: #e53e3e;
        }

        .step-indicator {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .step {
            flex: 1;
            text-align: center;
        }

        .step-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #eee;
            color: #999;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .step.active .step-number {
            background: #6b21a8;
            color: white;
        }

        .step.completed .step-number {
            background: #22863a;
            color: white;
        }

        .step-label {
            font-size: 12px;
            color: #999;
        }

        .step.active .step-label {
            color: #6b21a8;
            font-weight: 600;
        }

        .step.completed .step-label {
            color: #22863a;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="reset-header">
            <h1>Quên mật khẩu</h1>
            <p>Nhập thông tin để đặt lại mật khẩu của bạn</p>
        </div>

        <div class="step-indicator">
            <div class="step active" id="step-1">
                <div class="step-number">1</div>
                <div class="step-label">Email</div>
            </div>
            <div class="step" id="step-2">
                <div class="step-number">2</div>
                <div class="step-label">Xác thực OTP</div>
            </div>
            <div class="step" id="step-3">
                <div class="step-number">3</div>
                <div class="step-label">Mật khẩu mới</div>
            </div>
        </div>

        <!-- Step 1: Email -->
        <form id="email-form" class="reset-form active">
            <div class="form-group">
                <label for="email">Địa chỉ email:</label>
                <input type="email" id="email" placeholder="Nhập email của bạn" required>
                <div class="error-message" id="email-error"></div>
            </div>
            <button type="submit" class="btn-submit">Gửi mã OTP</button>
            <div class="form-links">
                <a href="/pages/user/login.html">← Quay lại đăng nhập</a>
            </div>
        </form>

        <!-- Step 2: OTP Verification -->
        <form id="otp-form" class="reset-form">
            <div class="form-group">
                <label>Nhập mã OTP (6 chữ số):</label>
                <div class="otp-container" id="otp-container">
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
                </div>
                <div class="error-message" id="otp-error"></div>
            </div>
            <div class="timer" id="otp-timer">
                OTP sẽ hết hạn trong: <span id="timer-value">03:00</span>
            </div>
            <button type="submit" class="btn-submit">Xác thực OTP</button>
            <div class="form-links">
                <a href="#" id="resend-otp-link">Gửi lại mã OTP</a>
            </div>
        </form>

        <!-- Step 3: New Password -->
        <form id="password-form" class="reset-form">
            <div class="form-group">
                <label for="new-password">Mật khẩu mới:</label>
                <input type="password" id="new-password" placeholder="Nhập mật khẩu mới" required>
                <div class="error-message" id="password-error"></div>
            </div>
            <div class="form-group">
                <label for="confirm-password">Xác nhận mật khẩu:</label>
                <input type="password" id="confirm-password" placeholder="Nhập lại mật khẩu" required>
                <div class="error-message" id="confirm-error"></div>
            </div>
            <button type="submit" class="btn-submit">Đặt lại mật khẩu</button>
            <div class="success-message" id="success-message"></div>
            <div class="form-links">
                <a href="/pages/user/login.html">← Đăng nhập ngay</a>
            </div>
        </form>
    </div>

    <script src="/assets/js/core/api-client.js"></script>
    <script src="/assets/js/reset-password.js"></script>
</body>
</html>
