<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Địa điểm - EventTicket</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
        .venues-page { max-width: 1100px; margin: 40px auto; padding: 20px; }
        .search-panel { display:flex; flex-wrap:wrap; gap:16px; align-items:flex-end; margin-bottom:24px; }
        .search-panel input { flex:1; padding:10px 12px; border-radius:6px; border:1px solid #ccc; }
        .search-panel button { padding: 12px 22px; border:none; border-radius:8px; background:#007bff; color:white; cursor:pointer; }
        .venue-card { border:1px solid #ddd; border-radius:10px; padding:18px; margin-bottom:18px; background:#fff; }
        .venue-card h3 { margin-top:0; }
        .btn-detail { margin-top:12px; display:inline-block; padding:10px 18px; background:#28a745; color:white; border-radius:6px; text-decoration:none; }
    </style>
</head>
<body>
    <div id="header-container"></div>
    <main class="venues-page">
        <h1>Khám phá địa điểm</h1>
        <p>Tìm kiếm theo tên, địa chỉ hoặc lọc theo sức chứa tối thiểu.</p>

        <div class="search-panel">
            <input type="text" id="venue-keyword" placeholder="Tìm kiếm địa điểm theo tên hoặc địa chỉ" />
            <button id="btn-search-venues">Tìm kiếm</button>
            <input type="number" id="venue-capacity" placeholder="Sức chứa tối thiểu" min="0" style="max-width: 180px;" />
            <button id="btn-filter-capacity">Lọc sức chứa</button>
        </div>

        <div id="venue-results">Đang tải danh sách địa điểm...</div>
    </main>

    <script src="../../assets/js/core/api-client.js"></script>
    <script src="../../assets/js/venues.js"></script>
</body>
</html>
