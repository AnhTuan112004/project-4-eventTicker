<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng Nhập - EventTicket</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        .auth-container { max-width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold;}
        .form-group input { width: 100%; padding: 8px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 15px;}
        .btn-google { width: 100%; padding: 10px; background-color: #db4437; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 10px;}
        .btn-facebook { width: 100%; padding: 10px; background-color: #4267B2; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .divider { text-align: center; margin: 15px 0; position: relative; }
        .divider::before { content: ""; position: absolute; left: 0; top: 50%; width: 40%; height: 1px; background: #ccc; }
        .divider::after { content: ""; position: absolute; right: 0; top: 50%; width: 40%; height: 1px; background: #ccc; }
    </style>
</head>
<body>
    <div id="header-container"></div>

    <main class="auth-container">
        <h2 style="text-align: center; margin-bottom: 20px;">Đăng Nhập Tài Khoản</h2>
        
        <form id="loginForm">
            <div id="login-msg" style="margin-bottom: 15px; font-weight: bold; display: none;"></div>

            <div class="form-group">
                <label>Email đăng nhập:</label>
                <input type="email" id="email" required placeholder="Nhập email của bạn">
            </div>
            
            <div class="form-group">
                <label>Mật khẩu:</label>
                <input type="password" id="password" required placeholder="Nhập mật khẩu">
            </div>

            <div class="flex-between">
                <label style="font-weight: normal;"><input type="checkbox"> Ghi nhớ đăng nhập</label>
                <a href="#" id="btn-forgot-password" style="color: #007bff; text-decoration: none;">Quên mật khẩu?</a>
            </div>

            <button type="submit" class="btn-main">Đăng Nhập</button>
        </form>

        <div class="divider">HOẶC</div>

        <button id="btn-google" class="btn-google">🌐 Đăng nhập bằng Google</button>
        <button id="btn-facebook" class="btn-facebook">📘 Đăng nhập bằng Facebook</button>

        <p style="text-align: center; margin-top: 20px;">
            Chưa có tài khoản? <a href="/pages/user/register.html" style="color: #007bff;">Đăng ký ngay</a>
        </p>
    </main>

    <script src="/assets/js/core/api-client.js"></script>
    <script src="/assets/js/auth.js"></script>
</body>
</html>
