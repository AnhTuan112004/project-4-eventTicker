<div id="chat-widget-fab" type="button"
    class="fixed bottom-5 right-4 sm:bottom-6 sm:right-8 w-14 h-14 rounded-full bg-gradient-to-r from-orange-500 to-rose-500 text-white flex items-center justify-center shadow-[0_18px_45px_rgba(242,111,33,0.35)] z-[1000] border-none cursor-pointer outline-none transition-all duration-300 hover:scale-105 active:scale-95">
    <i id="fab-chat-icon" class="fas fa-comment-dots text-xl"></i>
    <i id="fab-close-icon" class="fas fa-times text-xl hidden"></i>
</div>

<div id="chat-popup-container"
    class="hidden fixed bottom-24 right-4 sm:right-8 w-[min(92vw,360px)] max-h-[78vh] bg-white rounded-[28px] shadow-[0_24px_80px_rgba(15,23,42,0.18)] border border-gray-100 flex flex-col overflow-hidden z-[1000]">
    <div class="px-4 py-3 border-b border-gray-100 bg-gradient-to-r from-orange-500 to-rose-500 text-white">
        <div class="flex items-center justify-between gap-3">
            <div class="flex items-center gap-3 min-w-0">
                <div class="w-10 h-10 rounded-2xl bg-white/15 flex items-center justify-center shrink-0">
                    <i class="fas fa-crow text-lg"></i>
                </div>
                <div class="min-w-0">
                    <p class="text-sm font-extrabold truncate">BDHT Assistant</p>
                    <p class="text-[11px] text-white/80">Hỏi về sự kiện, vé, đăng ký hoặc đăng nhập.</p>
                </div>
            </div>
            <button id="chat-close-btn" type="button"
                class="w-9 h-9 rounded-full bg-white/15 hover:bg-white/25 text-white flex items-center justify-center transition-colors border-none outline-none">
                <i class="fas fa-times text-sm"></i>
            </button>
        </div>
    </div>

    <div id="chat-messages-box" class="flex-1 overflow-y-auto px-4 py-4 bg-slate-50">
        <div class="flex gap-3 items-start">
            <div class="w-8 h-8 rounded-full bg-gradient-to-r from-orange-400 to-rose-400 text-white flex items-center justify-center shrink-0 shadow-sm">
                <i class="fas fa-crow text-xs"></i>
            </div>
            <div class="bg-white border border-gray-100 p-4 rounded-[22px] rounded-tl-sm shadow-sm max-w-[85%] leading-relaxed text-gray-700 text-sm">
                Xin chào! Tôi là BDHT Assistant. Bạn muốn xem sản phẩm, đăng ký hoặc đăng nhập? Hãy hỏi tôi trực tiếp.
            </div>
        </div>
    </div>

    <div class="border-t border-gray-100 bg-white px-3 py-3">
        <div class="flex items-end gap-2">
            <textarea id="chat-input-field" rows="1" placeholder="Nhập câu hỏi của bạn..."
                class="flex-1 resize-none border border-gray-200 rounded-2xl px-4 py-3 text-sm text-gray-800 bg-gray-50 focus:border-orange-400 focus:ring-2 focus:ring-orange-100 outline-none min-h-[46px] max-h-[120px]"></textarea>
            <button id="chat-send-btn" type="button"
                class="w-11 h-11 rounded-full bg-slate-900 hover:bg-brand-purple text-white flex items-center justify-center border-none cursor-pointer shadow-md transition-colors shrink-0">
                <i class="fas fa-paper-plane text-sm"></i>
            </button>
        </div>
        <p class="mt-2 text-[10px] font-semibold text-gray-400 uppercase tracking-[0.2em]">Chat chỉ còn một khung giao tiếp</p>
    </div>
</div>
