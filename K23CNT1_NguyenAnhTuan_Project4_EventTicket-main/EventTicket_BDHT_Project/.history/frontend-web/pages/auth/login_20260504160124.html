<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - EventTicket</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <div class="container" style="max-width: 400px; margin-top: 100px;">
        <div class="card">
            <h2>Đăng Nhập</h2>
            <form id="loginForm">
                <div style="margin-bottom: 1rem;">
                    <label>Email:</label>
                    <input type="email" id="email" required class="form-control" style="width:100%; padding:0.75rem; border:1px solid #ddd; border-radius:4px;">
                </div>
                <div style="margin-bottom: 1rem;">
                    <label>Mật khẩu:</label>
                    <input type="password" id="password" required class="form-control" style="width:100%; padding:0.75rem; border:1px solid #ddd; border-radius:4px;">
                </div>
                <button type="submit" class="btn" style="width:100%;">Đăng Nhập</button>
            </form>
            <p style="text-align:center; margin-top:1rem;">
                Chưa có tài khoản? <a href="register.html">Đăng ký</a>
            </p>
            <div id="message"></div>
        </div>
    </div>

    <script src="../../assets/js/core/api-client.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('http://localhost:8080/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });
                const data = await response.json();
                if (data.token) {
                    localStorage.setItem('token', data.token);
                    window.location.href = '../../index.html';
                }
            } catch (error) {
                document.getElementById('message').innerHTML = '<p style="color:red;">Lỗi đăng nhập!</p>';
            }
        });
    </script>
</body>
</html>
