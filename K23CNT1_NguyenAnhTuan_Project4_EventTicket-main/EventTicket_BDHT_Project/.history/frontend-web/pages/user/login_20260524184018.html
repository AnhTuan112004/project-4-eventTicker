<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - BDHT Premium Ticketing</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            purple: '#5f1082',
                            purpleHover: '#4d0b6b',
                            orange: '#f26f21',
                            orangeHover: '#d95a12',
                            darkBg: '#333333'
                        }
                    },
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased flex flex-col min-h-screen">

    <main class="flex-1 flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 bg-gradient-to-br from-indigo-50 to-purple-50">
        <div class="max-w-md w-full bg-white rounded-3xl p-8 shadow-[0_20px_50px_rgba(0,0,0,0.1)] border border-gray-100">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">Đăng Nhập</h2>
                <p class="text-sm font-medium text-gray-500 mt-2">Truy cập vào kho vé điện tử của bạn</p>
            </div>
            
            <form id="loginForm" class="flex flex-col gap-5">
                <div id="login-msg" class="hidden font-bold text-sm p-3 rounded-xl"></div>

                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-bold text-gray-700 uppercase tracking-wide">Email đăng nhập</label>
                    <input type="email" id="email" required placeholder="Nhập email của bạn" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm font-medium focus:border-brand-purple focus:ring-4 focus:ring-brand-purple/10 outline-none transition-all">
                </div>
                
                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-bold text-gray-700 uppercase tracking-wide">Mật khẩu</label>
                    <input type="password" id="password" required placeholder="Nhập mật khẩu" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm font-medium focus:border-brand-purple focus:ring-4 focus:ring-brand-purple/10 outline-none transition-all">
                </div>

                <div class="flex items-center justify-between mt-2">
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <input type="checkbox" class="w-4 h-4 text-brand-purple rounded border-gray-300 focus:ring-brand-purple cursor-pointer">
                        <span class="text-xs font-semibold text-gray-600 group-hover:text-gray-900 transition">Ghi nhớ đăng nhập</span>
                    </label>
                    <div class="flex flex-col items-end gap-1">
                        <a href="reset-password.html" class="text-[10px] font-bold text-gray-400 hover:text-gray-600 transition-colors">Quên mật khẩu (OTP)?</a>
                        <a href="forgot-password-link.html" class="text-xs font-bold text-brand-orange hover:text-brand-orangeHover transition-colors">Quên mật khẩu (Link)?</a>
                    </div>
                </div>

                <button type="submit" class="w-full bg-brand-purple hover:bg-brand-purpleHover text-white font-extrabold px-6 py-3.5 rounded-xl text-sm uppercase tracking-wider transition-all duration-300 shadow-md hover:shadow-xl hover:-translate-y-0.5 mt-2">
                    Đăng Nhập
                </button>
            </form>

            <div class="flex items-center my-6">
                <div class="flex-1 h-px bg-gray-200"></div>
                <span class="px-3 text-xs font-bold text-gray-400 uppercase tracking-wider">Hoặc</span>
                <div class="flex-1 h-px bg-gray-200"></div>
            </div>

            <div class="flex flex-col gap-3">
                <button id="btn-google" class="w-full bg-white hover:bg-gray-50 text-gray-700 border border-gray-200 font-bold px-6 py-3 rounded-xl text-sm transition-all duration-300 shadow-sm flex items-center justify-center gap-3">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" class="w-5 h-5">
                    Đăng nhập bằng Google
                </button>
                <button id="btn-facebook" class="w-full bg-[#1877F2] hover:bg-[#166fe5] text-white font-bold px-6 py-3 rounded-xl text-sm transition-all duration-300 shadow-sm flex items-center justify-center gap-3">
                    <i class="fab fa-facebook-f text-lg"></i>
                    Đăng nhập bằng Facebook
                </button>
            </div>

            <p class="text-center mt-8 text-sm font-medium text-gray-600">
                Chưa có tài khoản? <a href="register.html" class="font-extrabold text-brand-purple hover:text-brand-orange transition-colors">Đăng ký ngay</a>
            </p>
        </div>
    </main>

    <!-- Google Identity Services SDK -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <script>
        window.SOCIAL_AUTH_CONFIG = {
            googleClientId: '404310159595-htrj1gvm7nv4hsak6j64584tu350e1jd.apps.googleusercontent.com',
            facebookAppId: '1011292878124831' // Đã cập nhật tự động từ App ID trên màn hình của bạn
        };

        // Khởi tạo SDK Facebook không đồng bộ
        window.fbAsyncInit = function() {
            FB.init({
                appId      : window.SOCIAL_AUTH_CONFIG.facebookAppId,
                cookie     : true,                     
                xfbml      : true,                     
                version    : 'v18.0'           
            });
        };

        (function(d, s, id) {
            var js, fjs = d.getElementsByTagName(s)[0];
            if (d.getElementById(id)) return;
            js = d.createElement(s); js.id = id;
            js.src = "https://connect.facebook.net/vi_VN/sdk.js";
            fjs.parentNode.insertBefore(js, fjs);
        }(document, 'script', 'facebook-jssdk'));
    </script>

    <script src="../../assets/js/core/api-client.js"></script>
    <script src="../../assets/js/auth.js"></script>
</body>
</html>
