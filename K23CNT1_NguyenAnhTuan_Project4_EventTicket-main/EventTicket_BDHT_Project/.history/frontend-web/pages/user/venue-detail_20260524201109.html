<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi Tiết Địa Điểm - BDHT Premium</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: { purple: '#5f1082', orange: '#f26f21' } },
                    fontFamily: { sans: ['Poppins', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
        .venue-detail { max-width: 1000px; margin: 40px auto; padding: 20px; }
        .venue-card { 
            border: none; 
            border-radius: 20px; 
            padding: 32px; 
            background: #fff; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            position: relative;
            overflow: hidden;
        }
        .venue-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 6px;
            background: linear-gradient(to right, #f26f21, #5f1082);
        }
        .venue-card h1 { 
            margin-top: 0; 
            font-weight: 800;
            font-size: 28px;
            color: #1f2937;
            margin-bottom: 24px;
        }
        .venue-info-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }
        @media(min-width: 768px) {
            .venue-info-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
        .venue-field { 
            margin-bottom: 16px; 
            display: flex;
            align-items: flex-start;
            gap: 12px;
            font-size: 15px;
        }
        .venue-field i {
            color: #f26f21;
            font-size: 18px;
            margin-top: 3px;
        }
        .venue-field .label {
            font-weight: 700;
            color: #4b5563;
            min-width: 100px;
        }
        .venue-field .value {
            color: #6b7280;
            flex: 1;
            line-height: 1.6;
        }
        .back-link { 
            display: inline-flex; 
            align-items: center;
            gap: 8px;
            margin-top: 24px; 
            text-decoration: none; 
            color: #f26f21; 
            font-weight: 600;
            transition: color 0.2s;
        }
        .back-link:hover { color: #5f1082; }

        .venue-events-section {
            margin-top: 40px;
        }
        .venue-events-section h2 {
            font-size: 22px;
            font-weight: 800;
            color: #1f2937;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .event-card {
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            overflow: hidden;
            background: #fff;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
        }
        .event-card:hover {
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transform: translateY(-4px);
            border-color: #f26f21;
        }
        .event-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            background: #f3f4f6;
        }
        .event-content {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .event-title {
            font-weight: 700;
            font-size: 16px;
            color: #111827;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .event-date {
            font-size: 13px;
            color: #6b7280;
            font-weight: 500;
        }
        .event-btn {
            margin-top: auto;
            background: #fef2f2;
            color: #ef4444;
            text-align: center;
            padding: 8px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.2s;
        }
        .event-btn:hover {
            background: #ef4444;
            color: #fff;
        }
    </style>
</head>
<body>
    <div id="header-container"></div>
    <main class="venue-detail">
        <a href="venues.html" class="back-link mb-6">
            <i class="fas fa-arrow-left"></i> Quay lại danh sách địa điểm
        </a>

        <div class="venue-card">
            <div id="detail-content">
                <div class="text-center text-gray-500 py-10">
                    <i class="fas fa-spinner fa-spin text-3xl mb-3 text-orange-500"></i>
                    <p class="font-medium text-sm">Đang tải thông tin địa điểm...</p>
                </div>
            </div>
        </div>

        <div class="venue-events-section hidden" id="venue-events-section">
            <h2><i class="fas fa-calendar-alt text-brand-purple"></i> Các sự kiện tại đây</h2>
            <div id="venue-events-grid" class="events-grid">
                <!-- Events will be injected here -->
            </div>
            <div id="venue-events-empty" class="hidden text-center py-10 bg-gray-50 rounded-2xl border border-gray-100 border-dashed mt-4">
                <i class="far fa-calendar-times text-4xl text-gray-300 mb-3"></i>
                <p class="text-gray-500 font-medium text-sm">Chưa có sự kiện nào được tổ chức tại địa điểm này.</p>
            </div>
        </div>
    </main>

    <script src="../../assets/js/core/api-client.js"></script>
    <script src="../../assets/js/venue-detail.js"></script>
</body>
</html>
