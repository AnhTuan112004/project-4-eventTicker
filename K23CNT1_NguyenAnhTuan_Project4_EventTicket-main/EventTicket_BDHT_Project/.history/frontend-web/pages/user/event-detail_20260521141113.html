<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi Tiết Sự Kiện - EventTicket</title>

    <link rel="stylesheet" href="../assets/css/style.css?v=1.3">
    <style>
        .event-detail-container { max-width: 1000px; margin: 40px auto; padding: 20px; display: flex; gap: 30px; flex-wrap: wrap; }
        .event-image { flex: 1.2; min-width: 300px; }
        .event-image img { width: 100%; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); object-fit: cover; }
        .event-info { flex: 1; min-width: 300px; display: flex; flex-direction: column; }
        .event-title { font-size: 28px; color: #333; margin-top: 0; margin-bottom: 15px; }
        .info-item { margin-bottom: 15px; font-size: 16px; line-height: 1.5; color: #444; }
        .price-tag { font-size: 26px; color: #e74c3c; font-weight: bold; margin: 15px 0; border-bottom: 1px solid #ddd; padding-bottom: 15px;}
        .booking-section { background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #ddd; margin-top: auto; }
        .qty-input { width: 70px; padding: 10px; font-size: 16px; margin-right: 15px; border: 1px solid #ccc; border-radius: 4px; text-align: center; }
        .btn-book { padding: 12px 25px; background-color: #28a745; color: white; border: none; border-radius: 4px; font-size: 18px; cursor: pointer; font-weight: bold; width: calc(100% - 90px); }
        .btn-book:hover { background-color: #218838; }
        #error-msg { text-align: center; color: red; font-size: 20px; margin-top: 50px; display: none; }
        #loading-msg { text-align: center; font-size: 20px; margin-top: 50px; color: #007bff; }
    </style>
</head>
<body>
    <div id="header-container"></div>

    <main>
        <div id="loading-msg">Đang tải thông tin sự kiện...</div>
        <div id="error-msg"></div>

        <div id="event-content" class="event-detail-container" style="display: none;">
            <div class="event-image">
                <div id="detail-images"></div>
                <img id="detail-image" src="" alt="Event Image">
            </div>

            <div class="event-info">
                <h1 id="detail-title" class="event-title">Đang cập nhật...</h1>
                
                <div id="detail-venue-info"></div>
                <div class="info-item">
                    <strong>📅 Ngày giờ:</strong> <span id="detail-date">Đang cập nhật</span>
                </div>
                <div class="info-item">
                    <strong>📝 Mô tả:</strong> <span id="detail-desc">Chưa có thông tin mô tả cho sự kiện này.</span>
                </div>
                
                <div id="detail-price" class="price-tag">0 VNĐ</div>

                <div class="booking-section">
                    <h3 style="margin-top: 0;">Chọn loại vé</h3>
                    <div id="ticket-types" style="margin-bottom: 18px;"></div>
                    <h3 style="margin-top: 0;">Mua Vé Ngay</h3>
                    <form id="booking-form" style="display: flex; align-items: center; flex-wrap: wrap; gap: 10px;">
                        <input type="number" id="ticket-qty" class="qty-input" value="1" min="1" max="10" title="Số lượng vé">
                        <button type="submit" class="btn-book">Xác Nhận Đặt Vé</button>
                    </form>
                    <div id="booking-msg" style="margin-top: 10px; font-weight: bold; text-align: center;"></div>
                </div>
            </div>
        </div>

        <section id="event-reviews-section" class="event-detail-container" style="display:none; flex-direction: column;">
            <div style="width:100%; display:flex; justify-content:space-between; gap:16px; flex-wrap:wrap; align-items:center;">
                <div>
                    <h2 style="margin:0;">Danh gia va binh luan</h2>
                    <p id="review-average" style="margin:6px 0 0; color:#666;">Dang tai diem danh gia...</p>
                </div>
            </div>
            <form id="review-form" class="booking-section" style="display:none; width:100%;">
                <h3 style="margin-top:0;">Viet danh gia cua ban</h3>
                <select id="review-rating" style="padding:10px; border:1px solid #ccc; border-radius:6px; margin-bottom:10px;">
                    <option value="5">5 sao</option>
                    <option value="4">4 sao</option>
                    <option value="3">3 sao</option>
                    <option value="2">2 sao</option>
                    <option value="1">1 sao</option>
                </select>
                <textarea id="review-comment" rows="3" placeholder="Nhap binh luan..." style="width:100%; padding:10px; border:1px solid #ccc; border-radius:6px;"></textarea>
                <button type="submit" class="btn-book" style="width:auto; margin-top:10px;">Gui danh gia</button>
                <div id="review-form-msg" style="margin-top:10px; font-weight:bold;"></div>
            </form>
            <div id="reviews-list" style="width:100%;"></div>
        </section>
    </main>

    <script src="../../assets/js/core/api-client.js"></script>
    <script src="../../assets/js/event-detail.js"></script>
</body>
</html>
