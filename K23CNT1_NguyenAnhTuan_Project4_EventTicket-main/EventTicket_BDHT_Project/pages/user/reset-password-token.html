<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu - BDHT Premium Ticketing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            purple: '#5f1082',
                            purpleHover: '#4d0b6b',
                            orange: '#f26f21',
                            orangeHover: '#d95a12'
                        }
                    },
                    fontFamily: { sans: ['Poppins', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased flex flex-col min-h-screen">
    <div id="header-container"></div>

    <main class="flex-1 flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 bg-gradient-to-br from-indigo-50 to-purple-50">
        <div class="max-w-md w-full bg-white rounded-3xl p-8 shadow-2xl border border-gray-100 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-brand-purple/10 rounded-full blur-3xl -mr-10 -mt-10"></div>
            <div class="absolute bottom-0 left-0 w-32 h-32 bg-brand-orange/10 rounded-full blur-3xl -ml-10 -mb-10"></div>
            
            <div class="relative z-10 text-center mb-8">
                <div class="w-16 h-16 bg-purple-50 rounded-full flex items-center justify-center mx-auto mb-4 border border-purple-100">
                    <i class="fas fa-key text-2xl text-brand-purple"></i>
                </div>
                <h2 class="text-2xl font-extrabold text-gray-900 tracking-tight">Tạo mật khẩu mới</h2>
                <p class="text-sm font-medium text-gray-500 mt-2">Vui lòng nhập mật khẩu mới của bạn</p>
            </div>
            
            <form id="resetPassTokenForm" class="relative z-10 flex flex-col gap-5 hidden">
                <div id="reset-msg" class="hidden font-bold text-sm p-4 rounded-xl text-center"></div>

                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-bold text-gray-700 uppercase tracking-wide">Mật khẩu mới</label>
                    <input type="password" id="newPassword" required placeholder="Nhập mật khẩu mới" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm font-medium focus:border-brand-purple focus:ring-4 focus:ring-brand-purple/10 outline-none transition-all">
                </div>
                
                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-bold text-gray-700 uppercase tracking-wide">Xác nhận mật khẩu</label>
                    <input type="password" id="confirmPassword" required placeholder="Nhập lại mật khẩu mới" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm font-medium focus:border-brand-purple focus:ring-4 focus:ring-brand-purple/10 outline-none transition-all">
                </div>

                <button type="submit" id="btn-reset-token" class="w-full bg-brand-purple hover:bg-brand-purpleHover text-white font-extrabold px-6 py-3.5 rounded-xl text-sm uppercase tracking-wider transition-all duration-300 shadow-lg shadow-purple-500/30 hover:-translate-y-0.5 mt-2 flex justify-center items-center gap-2">
                    <span>Đổi Mật Khẩu</span>
                </button>
            </form>
            
            <div id="invalid-token-msg" class="relative z-10 text-center hidden">
                <div class="p-4 bg-red-50 text-red-600 rounded-xl font-bold text-sm border border-red-100 mb-6">
                    Đường dẫn khôi phục không hợp lệ hoặc đã hết hạn!
                </div>
                <a href="forgot-password-link.html" class="inline-block bg-white border-2 border-brand-orange text-brand-orange hover:bg-brand-orange hover:text-white font-bold px-6 py-3 rounded-xl text-sm transition-all shadow-sm">
                    Yêu cầu Link mới
                </a>
            </div>

            <div class="relative z-10 text-center mt-6">
                <a href="login.html" class="inline-flex items-center justify-center w-10 h-10 rounded-full bg-gray-100 text-gray-500 hover:bg-gray-200 hover:text-gray-900 transition-colors" title="Quay lại Đăng nhập">
                    <i class="fas fa-arrow-left"></i>
                </a>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>

    <script src="../../assets/js/core/api-client.js"></script>
    <script src="../../assets/js/auth-link.js"></script>
</body>
</html>
