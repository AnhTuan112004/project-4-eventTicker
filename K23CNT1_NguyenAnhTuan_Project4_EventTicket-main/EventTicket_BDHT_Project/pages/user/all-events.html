<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sự Kiện - BDHT Premium</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            purple: '#5f1082',
                            purpleHover: '#4d0b6b',
                            orange: '#f26f21',
                            orangeHover: '#d95a12',
                            darkBg: '#333333'
                        }
                    }
                }
            }
        }
    </script>
    <!-- Google Font Outfit & FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../assets/css/style.css?v=1.3">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f8fafc;
        }
        /* Custom scrollbar hiding */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="text-slate-800 antialiased">

    <!-- Shared Dynamic Header Element -->
    <div id="header-container"></div>

    <main class="pb-20">
        
        <!-- ==================== 1. HERO SLIDER BANNER (Full-width) ==================== -->
        <section class="relative w-full overflow-hidden bg-slate-900" style="height: 480px;">
            <div id="hero-slider-track" class="w-full h-full flex transition-transform duration-700 ease-in-out">
                <!-- Slides are dynamically rendered via all-events.js -->
            </div>
            
            <!-- Prev / Next arrows -->
            <button onclick="moveHeroSlide(-1)" type="button" class="absolute left-6 top-1/2 -translate-y-1/2 w-12 h-12 rounded-full bg-black/40 hover:bg-orange-500 text-white flex items-center justify-center transition border-none cursor-pointer outline-none z-10 hover:shadow-lg"><i class="fas fa-chevron-left text-sm"></i></button>
            <button onclick="moveHeroSlide(1)" type="button" class="absolute right-6 top-1/2 -translate-y-1/2 w-12 h-12 rounded-full bg-black/40 hover:bg-orange-500 text-white flex items-center justify-center transition border-none cursor-pointer outline-none z-10 hover:shadow-lg"><i class="fas fa-chevron-right text-sm"></i></button>
            
            <!-- Indicator Dots -->
            <div id="hero-dots-container" class="absolute bottom-6 left-1/2 -translate-x-1/2 flex gap-3 z-10">
                <!-- Dots are dynamically rendered via all-events.js -->
            </div>
        </section>

        <!-- ==================== 2. FEATURED EVENTS CAROUSEL (Horizontal) ==================== -->
        <section class="max-w-7xl mx-auto px-6 py-12">
            <div class="flex justify-between items-end border-b border-slate-100 pb-4 mb-8">
                <div class="flex flex-col gap-1">
                    <div class="flex items-center gap-2">
                        <div class="w-1.5 h-6 bg-brand-orange rounded"></div>
                        <h2 class="text-xl font-black text-slate-900 uppercase tracking-wide">Sự Kiện Nổi Bật</h2>
                    </div>
                    <p class="text-xs text-slate-400 font-bold">Danh sách những buổi liveshow và lễ hội âm nhạc đỉnh cao không thể bỏ lỡ</p>
                </div>
                <!-- Manual Scroll Arrows -->
                <div class="flex items-center gap-2.5">
                    <button id="featured-prev" type="button" class="w-10 h-10 rounded-xl border border-slate-200 bg-white hover:bg-slate-50 text-slate-600 flex items-center justify-center transition shadow-sm hover:shadow active:scale-95"><i class="fas fa-chevron-left text-xs"></i></button>
                    <button id="featured-next" type="button" class="w-10 h-10 rounded-xl border border-slate-200 bg-white hover:bg-slate-50 text-slate-600 flex items-center justify-center transition shadow-sm hover:shadow active:scale-95"><i class="fas fa-chevron-right text-xs"></i></button>
                </div>
            </div>

            <!-- Carousel track wrapper -->
            <div class="relative overflow-hidden py-2">
                <div id="featured-carousel-track" class="flex gap-6 overflow-x-auto pb-4 scrollbar-hide scroll-smooth">
                    <!-- Event Cards dynamically rendered via all-events.js -->
                </div>
            </div>
        </section>

        <!-- ==================== 3. SEARCH & CATEGORY CHIPS ==================== -->
        <section class="max-w-7xl mx-auto px-6 py-8">
            <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm flex flex-col md:flex-row md:items-center justify-between gap-6">
                <div class="flex flex-col gap-1">
                    <h3 class="text-base font-black text-slate-800 uppercase tracking-wider">Khám Phá Toàn Bộ Sự Kiện</h3>
                    <p class="text-[10px] text-slate-400 font-bold">Tìm kiếm nhanh chóng sự kiện yêu thích của bạn</p>
                </div>
                <div class="flex-1 max-w-xl flex gap-3">
                    <div class="relative flex-1">
                        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-xs"></i>
                        <input type="text" id="all-events-search" placeholder="Tìm theo tên sự kiện, ca sĩ hoặc địa điểm..." class="w-full pl-10 pr-4 py-3 border border-slate-200 rounded-2xl text-xs font-semibold focus:border-brand-purple outline-none bg-slate-50/50 text-slate-800 transition" />
                    </div>
                </div>
            </div>

            <!-- FIX: chips được render động từ dữ liệu sự kiện, không hardcode ở HTML -->
            <div id="all-events-categories" class="flex flex-wrap gap-2.5 mt-8"></div>
        </section>

        <!-- ==================== 4. ALL EVENTS GRID ==================== -->
        <section class="max-w-7xl mx-auto px-6 py-8">
            <div id="all-events-section-title" class="flex items-center gap-2 mb-8">
                <div class="w-1.5 h-6 bg-brand-purple rounded"></div>
                <h2 class="text-lg font-black text-slate-900 uppercase tracking-wide">TẤT CẢ SỰ KIỆN</h2>
            </div>

            <!-- Responsive 4-Column Grid on Desktop -->
            <div id="all-events-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                <!-- Rendered dynamically via all-events.js -->
            </div>

            <!-- Pagination Bar -->
            <div id="pagination-wrapper" class="flex items-center justify-center gap-2 mt-16 border-t border-slate-100 pt-8">
                <div id="pagination-controls" class="flex items-center gap-2">
                    <!-- Pagination buttons are rendered here dynamically -->
                </div>
            </div>
        </section>

    </main>

    <!-- Shared Dynamic Footer Element -->
    <div id="footer-container"></div>

    <!-- Script References -->
    <script src="../../assets/js/core/api-client.js"></script>
    <script src="../../assets/js/all-events.js"></script>
</body>
</html>
