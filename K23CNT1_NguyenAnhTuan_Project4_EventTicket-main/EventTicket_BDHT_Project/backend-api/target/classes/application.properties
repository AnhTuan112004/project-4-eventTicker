# ==========================================
# 1. SERVER CONFIGURATION
# ==========================================
server.port=8080

# ==========================================
# 2. DATABASE CONFIGURATION (MS SQL SERVER)
# ==========================================

spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=Event_Ticket_BDHT;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ==========================================
# 3. JPA / HIBERNATE CONFIGURATION
# ==========================================
# Tự động cập nhật bảng nếu Entity có thay đổi
spring.jpa.hibernate.ddl-auto=update

# Chỉ định rõ loại Database để Hibernate tối ưu câu lệnh
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

# Bật hiển thị câu lệnh SQL ra console để dễ debug
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# 4. JWT CONFIGURATION
# ==========================================
app.jwtSecret=eventticketbdhtsecretkeymin32characterslongforsecurity
app.jwtExpirationMs=86400000

# ==========================================
# 5. CORS CONFIGURATION (Tùy chọn)
# ==========================================
# Bổ sung thêm 127.0.0.1 vì Live Server của VS Code thường dùng IP này
spring.web.cors.allowed-origins=http://localhost:5500,http://127.0.0.1:5500,http://localhost:8000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# ==========================================
# 6. EMAIL CONFIGURATION
# ==========================================
# Gmail SMTP Server
spring.mail.host=smtp.gmail.com
spring.mail.port=587

# ĐÃ SỬA: Điền tạm 1 email giả định vào để Spring Boot không bị lỗi nữa. 
# (Sau này làm chức năng Quên mật khẩu thì bạn điền email thật và mật khẩu ứng dụng vào đây)
spring.mail.username=test_email@gmail.com
spring.mail.password=test_password_123

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Frontend URL (Đổi lại thành 5500 cho khớp với cổng Live Server của bạn)
app.frontend.url=http://127.0.0.1:5500