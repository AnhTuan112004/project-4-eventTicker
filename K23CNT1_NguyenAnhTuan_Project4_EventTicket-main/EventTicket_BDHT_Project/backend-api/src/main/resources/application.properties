# ==========================================
# 3. JPA / HIBERNATE CONFIGURATION
# ==========================================
# Tự động cập nhật / tạo schema nếu thiếu bảng
spring.jpa.hibernate.ddl-auto=update

# Chỉ định rõ loại Database để Hibernate tối ưu câu lệnh
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

# Bật hiển thị câu lệnh SQL ra console để dễ debug (Rất cần thiết khi làm Backend)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# 4. JWT CONFIGURATION
# ==========================================
app.jwtSecret=eventticketbdhtsecretkeymin32characterslongforsecurity
app.jwtExpirationMs=86400000

# ==========================================
# 5. CORS CONFIGURATION (Tùy chọn)
# ==========================================
spring.web.cors.allowed-origins=http://localhost:5500,http://127.0.0.1:5500,http://localhost:8000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

