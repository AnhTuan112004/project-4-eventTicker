# ==========================================
# 1. SERVER CONFIGURATION
# ==========================================
server.port=8080

# ==========================================
# 2. DATABASE CONFIGURATION (MS SQL SERVER)
# ==========================================
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# CÁCH 1: DÙNG WINDOWS AUTHENTICATION (Không cần pass)
# Lưu ý: Cần copy file mssql-jdbc_auth.dll vào thư mục C:\Windows\System32 thì mới chạy được.
spring.datasource.url=jdbc:sqlserver://LAPTOP-9MACGRF6\\VUDUC;databaseName=Event_Ticket_BDHT;integratedSecurity=true;trustServerCertificate=true

# CÁCH 2 (Khuyên dùng): DÙNG TÀI KHOẢN SA (Bỏ comment 3 dòng dưới và comment Cách 1 lại nếu Cách 1 báo lỗi)
# spring.datasource.url=jdbc:sqlserver://LAPTOP-9MACGRF6\\VUDUC;databaseName=Event_Ticket_BDHT;encrypt=true;trustServerCertificate=true
# spring.datasource.username=sa
# spring.datasource.password=123456

# ==========================================
# 3. JPA / HIBERNATE CONFIGURATION
# ==========================================
# Tự động cập nhật bảng nếu Entity có thay đổi
spring.jpa.hibernate.ddl-auto=update

# Chỉ định rõ loại Database để Hibernate tối ưu câu lệnh
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

# Bật hiển thị câu lệnh SQL ra console để dễ debug (Rất cần thiết khi làm Backend)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# 4. JWT CONFIGURATION
# ==========================================
app.jwtSecret=eventticketbdhtsecretkeymin32characterslongforsecurity
app.jwtExpirationMs=86400000

# ==========================================
# 5. CORS CONFIGURATION (Tùy chọn)
# ==========================================
spring.web.cors.allowed-origins=http://localhost:5500,http://localhost:8000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# ==========================================
# 6. EMAIL CONFIGURATION
# ==========================================
# Gmail SMTP Server
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Frontend URL (dùng cho link reset password trong email)
app.frontend.url=http://localhost:3000