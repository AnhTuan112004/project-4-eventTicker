<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - EventTicket</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
        /* Thêm chút CSS riêng cho form nội bộ file này cho nhanh */
        .auth-container { max-width: 400px; margin: 50px auto; padding: 30px; border: 1px solid #ddd; border-radius: 8px; background: #fff; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-control { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .error-message { color: red; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>
    <div id="header-container"></div>

    <main class="container">
        <div class="auth-container">
            <h2 style="text-align: center; margin-bottom: 20px;">Đăng Nhập</h2>
            <div id="login-error" class="error-message">Sai tài khoản hoặc mật khẩu!</div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Tên đăng nhập (hoặc Email)</label>
                    <input type="text" id="username" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Đăng Nhập</button>
            </form>
            <p style="text-align: center; margin-top: 15px;">
                Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
            </p>
        </div>
    </main>

    <script src="../../assets/js/core/api-client.js"></script>
    <script src="../../assets/js/auth.js"></script>
</body>
</html>
